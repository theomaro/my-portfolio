<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Tailwind CSS -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <title>Backend Developer Portfolio</title>
  </head>

  <body class="min-h-screen bg-gray-950 text-white">
    <!-- Hero Section -->
    <section class="max-w-6xl mx-auto px-6 py-20">
      <div class="grid md:grid-cols-2 gap-10 items-center">
        <div>
          <p class="text-blue-400 font-medium mb-3">Full-Stack Developer</p>

          <h1 class="text-5xl md:text-6xl font-bold leading-tight mb-6">
            Hi, I'm <span class="text-blue-400">Mathew</span>
          </h1>

          <p class="text-gray-300 text-lg leading-relaxed mb-8 max-w-xl">
            Self-taught full-stack developer passionate about building modern
            web applications using Python, Django, React, and MySQL.
          </p>
        </div>
      </div>
    </section>

    <!-- Skills -->
    <section class="max-w-6xl mx-auto px-6 py-16">
      <div class="mb-12">
        <h2 class="text-3xl font-bold mb-3">Technical Skills</h2>

        <p class="text-gray-400">
          Technologies and tools I use for building full-stack web applications.
        </p>
      </div>

      <div
        id="skills-container"
        class="grid sm:grid-cols-2 lg:grid-cols-4 gap-6"
      ></div>
    </section>

    <script src="app.js"></script>
  </body>
</html>
